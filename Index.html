<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Car Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box;
            touch-action: none; /* Prevents iPad zooming and scrolling */
        }
        .btn-group { display: flex; gap: 15px; }
        .btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.7);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="controls">
        <div class="btn-group">
            <div class="btn" id="left">←</div>
            <div class="btn" id="right">→</div>
        </div>
        <div class="btn-group">
            <div class="btn" id="gas">Go</div>
            <div class="btn" id="brake">Stop</div>
        </div>
    </div>

    <!-- Import Three.js and the STL Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Grass (Simple ground)
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2e8b57 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Track (A flat ring)
        const trackGeo = new THREE.RingGeometry(30, 45, 64);
        const trackMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.y = 0.1; // Slightly above ground to prevent clipping
        scene.add(track);

        // Car Group
        let car = new THREE.Group();
        scene.add(car);
        
        // Placeholder box that displays while the STL loads
        const boxGeo = new THREE.BoxGeometry(2, 1, 4);
        const boxMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const placeholder = new THREE.Mesh(boxGeo, boxMat);
        placeholder.position.y = 0.5;
        car.add(placeholder);

        // Load your STL
        const loader = new THREE.STLLoader();
        
        // Loading the Arcx Car model
        loader.load('Arcx Car.stl', function(geometry) {
            car.remove(placeholder); 
            const mat = new THREE.MeshStandardMaterial({ color: 0x1E90FF, metalness: 0.7, roughness: 0.3 });
            const mesh = new THREE.Mesh(geometry, mat);
            
            // Adjust scale here. CAD models often export massive. 
            mesh.scale.set(0.1, 0.1, 0.1); 
            
            geometry.center(); // Centers the geometry anchor
            mesh.position.y = 1; 
            car.add(mesh);
        }, undefined, function(error) {
            console.log("STL not found yet, showing placeholder block.");
        });

        // Driving Physics variables
        let speed = 0;
        let angle = 0;
        const maxSpeed = 0.6;
        const acceleration = 0.015;
        const friction = 0.005;
        const turnSpeed = 0.04;

        // Touch Controls Setup
        const keys = { left: false, right: false, up: false, down: false };

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            // Touch events for iPad
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            // Mouse events for testing on desktop
            el.addEventListener('mousedown', () => keys[key] = true);
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        
        bindBtn('left', 'left'); bindBtn('right', 'right');
        bindBtn('gas', 'up'); bindBtn('brake', 'down');

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Physics logic
            if (keys.up) speed += acceleration;
            if (keys.down) speed -= acceleration;
            
            // Apply Friction
            if (speed > 0) speed = Math.max(0, speed - friction);
            if (speed < 0) speed = Math.min(0, speed + friction);
            
            // Cap to max speed
            speed = Math.max(-maxSpeed/2, Math.min(maxSpeed, speed));

            // Steering (only turn if the car is moving)
            if (Math.abs(speed) > 0.01) {
                if (keys.left) angle += turnSpeed * Math.sign(speed);
                if (keys.right) angle -= turnSpeed * Math.sign(speed);
            }

            // Update car position
            car.rotation.y = angle;
            car.position.x -= Math.sin(angle) * speed;
            car.position.z -= Math.cos(angle) * speed;

            // Camera chases car
            const cameraOffset = new THREE.Vector3(0, 5, 12);
            cameraOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
            camera.position.copy(car.position).add(cameraOffset);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }
        animate();

        // Keep canvas scaled properly if iPad is rotated
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
